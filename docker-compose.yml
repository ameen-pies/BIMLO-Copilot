version: '3.8'

services:
  # ==========================================================================
  # BACKEND SERVICE - FastAPI + RAG Engine
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bimlo-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend:/app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATA_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bimlo-network

  # ==========================================================================
  # FRONTEND SERVICE - React + Vite (Development)
  # ==========================================================================
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: bimlo-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - bimlo-network
    # Only run in development
    profiles:
      - dev

  # ==========================================================================
  # FRONTEND SERVICE - Production (Nginx)
  # ==========================================================================
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: bimlo-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - bimlo-network
    # Only run in production
    profiles:
      - prod

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  bimlo-network:
    driver: bridge

# =============================================================================
# VOLUMES (Optional - for persistent data)
# =============================================================================
volumes:
  chroma-data:
    driver: local
